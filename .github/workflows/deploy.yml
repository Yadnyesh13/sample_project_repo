name: Deploy to EC2 Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy code to EC2
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}

          script: |

            echo "Starting deployment..."

            IST_TIME=$(TZ="Asia/Kolkata" date +%Y-%m-%d_%I-%M-%S_%p | tr 'A-Z' 'a-z')

            BACKUP_DIR="/var/www/html/public/backups/backup_${IST_TIME}_ist"

            echo "Creating backup at $BACKUP_DIR"

            mkdir -p $BACKUP_DIR

            cp -r /var/www/html/public/sample_project_repo/* $BACKUP_DIR/

            echo "Backup completed successfully"

            cd /var/www/html/public/sample_project_repo

            echo "Pulling latest code from GitHub..."

            git pull origin main

            echo "Deployment completed successfully at $IST_TIME"
