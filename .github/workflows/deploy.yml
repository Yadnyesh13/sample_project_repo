name: Deploy to EC2 Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy code to EC2
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}

          script: |
            echo "Creating backup before deployment..."

            IST_TIME=$(TZ="Asia/Kolkata" date +"%Y-%m-%d_%I-%M-%S_%p")

            BACKUP_DIR="/var/www/html/public/backups/backup_${IST_TIME}_IST"

            mkdir -p $BACKUP_DIR

            cp -r /var/www/html/public/sample_project_repo/* $BACKUP_DIR/

            echo "Backup created at $BACKUP_DIR"

            echo "Updating repository..."

            cd ~/sample_project_repo

            git pull origin main

            echo "Deploying latest version to Apache folder..."

            sudo cp -r * /var/www/html/public/sample_project_repo/

            echo "Deployment completed successfully at $IST_TIME"
